services:
  btcagg-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: btc-aggregator
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - PAIR=BTC/USD
      - FETCH_INTERVAL=10
      - REQUEST_TIMEOUT=5
      - MAX_RETRIES=3
      - SHUTDOWN_TIMEOUT=${SHUTDOWN_TIMEOUT}
      - COINBASE_URL=${COINBASE_URL}
      - COINDESK_URL=${COINDESK_URL}
      - KRAKEN_URL=${KRAKEN_URL}
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      - prometheus
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge